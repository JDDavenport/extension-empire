<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #1c1e21; }
    .header { background: linear-gradient(135deg, #0866ff, #00a4ff); color: #fff; padding: 20px; text-align: center; }
    .header h1 { font-size: 18px; margin-bottom: 4px; }
    .header p { font-size: 12px; opacity: 0.85; }
    .status { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
    .badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
    .badge-pro { background: #ffd700; color: #333; }
    .badge-free { background: rgba(255,255,255,0.2); color: #fff; }
    .content { padding: 16px; }
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat { text-align: center; background: #f0f2f5; padding: 12px 6px; border-radius: 10px; }
    .stat strong { display: block; font-size: 20px; color: #0866ff; }
    .stat small { font-size: 11px; color: #65676b; }
    .section { margin-bottom: 14px; }
    .section h3 { font-size: 12px; color: #65676b; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 6px; text-align: left; }
    .btn-primary { background: #0866ff; color: #fff; }
    .btn-secondary { background: #f0f2f5; color: #1c1e21; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .upgrade-banner { background: linear-gradient(135deg, #ffd700, #ffaa00); padding: 14px; border-radius: 10px; text-align: center; margin-top: 10px; cursor: pointer; }
    .upgrade-banner strong { font-size: 14px; color: #333; }
    .upgrade-banner p { font-size: 11px; color: #555; margin-top: 4px; }
    .templates { margin-top: 8px; }
    .template { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #f0f2f5; border-radius: 8px; margin-bottom: 4px; font-size: 12px; }
    .template-name { font-weight: 600; }
    .template-edit { color: #0866ff; cursor: pointer; font-size: 11px; }
    .footer { padding: 12px 16px; border-top: 1px solid #e4e6eb; text-align: center; }
    .footer a { color: #65676b; font-size: 11px; text-decoration: none; }
    .nav { display: flex; border-bottom: 1px solid #e4e6eb; }
    .nav-tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 600; color: #65676b; cursor: pointer; border-bottom: 2px solid transparent; }
    .nav-tab.active { color: #0866ff; border-bottom-color: #0866ff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏪 FB Marketplace Pro</h1>
    <p>Power tools for marketplace sellers</p>
    <div class="status"><span id="plan-badge" class="badge badge-free">FREE</span></div>
  </div>

  <div class="nav">
    <div class="nav-tab active" data-tab="dashboard">📊 Dashboard</div>
    <div class="nav-tab" data-tab="templates">💬 Messages</div>
    <div class="nav-tab" data-tab="settings">⚙️ Settings</div>
  </div>

  <div class="content">
    <div id="tab-dashboard" class="tab-content active">
      <div class="stat-row">
        <div class="stat"><strong id="s-count">0</strong><small>Items Sold</small></div>
        <div class="stat"><strong id="s-revenue">$0</strong><small>Revenue</small></div>
        <div class="stat"><strong id="s-days">0</strong><small>Avg Days</small></div>
      </div>
      <div class="section">
        <h3>Quick Actions</h3>
        <button class="btn btn-secondary" id="btn-open-mp">🏪 Open Facebook Marketplace</button>
        <button class="btn btn-secondary" id="btn-open-selling">📦 My Selling Listings</button>
      </div>
      <div class="section">
        <h3>Price Drop Rules</h3>
        <div id="price-rules">No active rules</div>
      </div>
      <div id="upgrade-area"></div>
    </div>

    <div id="tab-templates" class="tab-content">
      <div class="section">
        <h3>Message Templates</h3>
        <div id="templates-list"></div>
        <div style="margin-top:10px">
          <input type="text" id="new-tpl-name" class="input" placeholder="Template name">
          <textarea id="new-tpl-text" class="input" placeholder="Template message" style="min-height:50px;resize:vertical"></textarea>
          <button class="btn btn-primary" id="btn-add-tpl">+ Add Template</button>
        </div>
      </div>
    </div>

    <div id="tab-settings" class="tab-content">
      <div class="section">
        <h3>Cross-Post Formats</h3>
        <label><input type="checkbox" id="set-craigslist" checked> Craigslist</label><br>
        <label><input type="checkbox" id="set-offerup" checked> OfferUp</label>
      </div>
      <div class="section">
        <h3>Account</h3>
        <button class="btn btn-primary" id="btn-manage-sub">Manage Subscription</button>
      </div>
    </div>
  </div>

  <div class="footer"><a href="https://fbmarketplacepro.com" target="_blank">FB Marketplace Pro v1.0.0</a></div>

  <script src="../lib/ExtPay.js"></script>
  <script src="popup.js"></script>
</body>
</html>
