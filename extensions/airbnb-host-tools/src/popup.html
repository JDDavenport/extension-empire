<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --primary: #FF5A5F;
      --primary-dark: #E04347;
      --bg: #ffffff;
      --bg-subtle: #f7f7f7;
      --text: #222222;
      --text-muted: #717171;
      --border: #DDDDDD;
      --success: #008A05;
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .header {
      background: var(--primary);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header .logo { font-size: 24px; }
    .header .plan-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg-subtle);
    }
    .tab {
      flex: 1;
      padding: 10px 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* Templates */
    .template-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .template-item:hover { border-color: var(--primary); }
    .template-item .tpl-name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .template-item .tpl-preview {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .template-item .tpl-category {
      font-size: 10px;
      background: var(--bg-subtle);
      padding: 2px 8px;
      border-radius: 10px;
      color: var(--text-muted);
    }

    /* Variables */
    .var-group { margin-bottom: 12px; }
    .var-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-muted);
    }
    .var-group input, .var-group textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }
    .var-group input:focus, .var-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(255,90,95,0.15);
    }

    /* Editor Modal */
    .editor-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: white;
      z-index: 100;
      flex-direction: column;
    }
    .editor-overlay.open { display: flex; }
    .editor-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .editor-header h2 { font-size: 14px; flex: 1; }
    .editor-body { flex: 1; padding: 12px 16px; overflow-y: auto; }
    .editor-body textarea {
      width: 100%;
      min-height: 160px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      resize: vertical;
    }
    .editor-body input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .editor-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
    }
    .btn:hover { background: var(--bg-subtle); }
    .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-danger { color: var(--primary); border-color: var(--primary); }
    .btn-danger:hover { background: #FFF0F0; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .btn-block { display: block; width: 100%; text-align: center; }
    .btn-upgrade {
      background: linear-gradient(135deg, #FF5A5F, #FF8C00);
      color: white;
      border: none;
      padding: 12px;
      font-size: 14px;
    }

    /* Stats */
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-value { font-weight: 700; }

    /* Scrollable content */
    .scroll-area {
      max-height: 260px;
      overflow-y: auto;
    }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .var-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding: 8px;
      background: var(--bg-subtle);
      border-radius: 6px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .add-row {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🏠</span>
    <h1>Host Power Tools</h1>
    <span class="plan-badge" id="plan-badge">Free</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="messages">📨 Messages</button>
    <button class="tab" data-tab="reviews">⭐ Reviews</button>
    <button class="tab" data-tab="variables">⚙️ Variables</button>
    <button class="tab" data-tab="stats">📊 Stats</button>
  </div>

  <div class="tab-content active" id="tab-messages">
    <div class="section-title">Message Templates</div>
    <div class="scroll-area" id="msg-list"></div>
    <div class="add-row">
      <button class="btn btn-sm" id="add-msg-btn">+ Add Template</button>
    </div>
  </div>

  <div class="tab-content" id="tab-reviews">
    <div class="section-title">Review Response Templates</div>
    <div class="scroll-area" id="review-list"></div>
    <div class="add-row">
      <button class="btn btn-sm" id="add-review-btn">+ Add Template</button>
    </div>
  </div>

  <div class="tab-content" id="tab-variables">
    <div class="var-hint">💡 These values auto-fill into your templates wherever you use {variable_name}.</div>
    <div id="var-fields"></div>
    <button class="btn btn-primary btn-block" id="save-vars">Save Variables</button>
  </div>

  <div class="tab-content" id="tab-stats">
    <div class="section-title">Your Stats</div>
    <div id="stats-area"></div>
    <div style="margin-top:16px;" id="upgrade-area"></div>
  </div>

  <!-- Template Editor -->
  <div class="editor-overlay" id="editor">
    <div class="editor-header">
      <button class="btn btn-sm" id="editor-back">← Back</button>
      <h2 id="editor-title">Edit Template</h2>
    </div>
    <div class="editor-body">
      <label style="font-size:12px;font-weight:600;margin-bottom:4px;display:block;">Name</label>
      <input type="text" id="editor-name" placeholder="Template name">
      <label style="font-size:12px;font-weight:600;margin-bottom:4px;display:block;">Body</label>
      <textarea id="editor-body" placeholder="Write your template..."></textarea>
      <div class="var-hint" style="margin-top:8px;">Variables: {guest_name}, {listing_name}, {address}, {checkin_time}, {checkout_time}, {wifi_name}, {wifi_password}, etc.</div>
    </div>
    <div class="editor-footer">
      <button class="btn btn-danger" id="editor-delete">Delete</button>
      <button class="btn btn-primary" id="editor-save">Save</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
