<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 320px; min-height: 200px; font-family: -apple-system, system-ui, sans-serif; background: #fafafa; }
.header { background: linear-gradient(135deg, #FDD835, #F9A825); padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 15px; font-weight: 600; color: #333; }
.pro-btn { background: rgba(0,0,0,.1); border: 1px solid rgba(0,0,0,.15); color: #333; padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; }
.content { padding: 12px; }
.btn { width: 100%; padding: 10px; background: #FDD835; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
.btn:hover { background: #F9A825; }
.notes-list { max-height: 300px; overflow-y: auto; }
.note-item { background: #FFF9C4; border-radius: 6px; padding: 8px 10px; margin-bottom: 4px; font-size: 12px; }
.note-item .url { color: #888; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.note-item .preview { margin-top: 4px; color: #555; }
.empty { text-align: center; color: #999; padding: 30px; font-size: 13px; }
</style>
</head><body>
<div class="header"><h1>📝 Quick Notes</h1><button class="pro-btn" id="proBtn">⭐ Pro</button></div>
<div class="content">
  <button class="btn" id="openNote">📌 Open Note on This Page</button>
  <div class="notes-list" id="notesList"></div>
  <div id="empty" class="empty">No notes yet. Click above to start!</div>
</div>
<script src="ExtPay.js"></script>
<script src="popup.js"></script>
</body></html>
