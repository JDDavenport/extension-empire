<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 300px; font-family: -apple-system, system-ui, sans-serif; background: #fafafa; }
.header { background: linear-gradient(135deg, #FF6B6B, #ee5a24); color: #fff; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 15px; }
.pro-btn { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; }
.content { padding: 12px; }
.pick-btn { width: 100%; padding: 12px; background: #FF6B6B; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.pick-btn:hover { background: #ee5a24; }
.palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 12px; }
.swatch { width: 100%; aspect-ratio: 1; border-radius: 8px; cursor: pointer; border: 2px solid transparent; position: relative; }
.swatch:hover { border-color: #333; }
.swatch .tip { display: none; position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; z-index: 10; }
.swatch:hover .tip { display: block; }
.actions { margin-top: 10px; display: flex; gap: 6px; }
.actions button { flex: 1; padding: 6px; border: 1px solid #ddd; background: #fff; border-radius: 6px; font-size: 11px; cursor: pointer; }
.empty { text-align: center; color: #999; padding: 20px; font-size: 13px; }
</style>
</head><body>
<div class="header"><h1>🎨 Color Picker Pro</h1><button class="pro-btn" id="proBtn">⭐ Pro</button></div>
<div class="content">
  <button class="pick-btn" id="pickBtn">🔍 Pick Color from Page</button>
  <div class="palette" id="palette"></div>
  <div id="empty" class="empty">Pick colors to build your palette!</div>
  <div class="actions" id="actions" style="display:none">
    <button id="clearBtn">🗑️ Clear All</button>
  </div>
</div>
<script src="ExtPay.js"></script>
<script src="popup.js"></script>
</body></html>
